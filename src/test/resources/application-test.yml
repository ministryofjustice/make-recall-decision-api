spring:
  main:
    allow-bean-definition-overriding: true
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:local-public-key.pub
  flyway:
    enabled: false

  # Cache disabled during majority of tests which rely on specific user access responses
  cache:
    type: none

server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

offender:
  search:
    endpoint:
      url: http://localhost:8093

delius:
  integration:
    endpoint:
      url: http://localhost:8097

arn:
  api:
    endpoint:
      url: http://localhost:8095

cvl:
  client:
    timeout: 2
  api:
    endpoint:
      url: http://localhost:8096


gotenberg:
  endpoint:
    url: http://localhost:8094

ppud-automation:
  api:
    endpoint:
      # the port is aligned with that set in PpudAutomationResponseMocker; if changing here, change there too
      url: http://localhost:8099

prison:
  client:
    timeout: 2
  api:
    endpoint:
      # the port is aligned with that set in PrisonApiResponseMocker; if changing here, change there too
      url: http://localhost:8098

oauth:
  endpoint:
    url: http://localhost:9090/auth
    client:
      id: client-id
      secret: client-secret

#hmpps:
#  auth.url: http://localhost:9090/auth

ndelius:
  client:
    timeout: 2

document-management:
  client:
    timeout: 2
  api:
    endpoint:
      url: http://localhost:9072

oasys:
  arn:
    client:
      timeout: 2

mrd:
  url: "environment-host"
  api:
    url: "environment-host"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

hmpps:
  # Disable JwtAuthorisationHelper auto-configuration globally so it does not register a @Primary
  # ReactiveJwtDecoder that overrides the project's JwtAuthHelper decoder in all test contexts.
  # The SAR integration test provides JwtAuthorisationHelper explicitly in its own SarTestConfig.
  test:
    jwt-helper-enabled: false
  sar:
    tests:
      expected-api-response:
        path: /sar/sar-api-response.json
      expected-render-result:
        path: /sar/sar-expected-report.html
      attachments-expected: false
